<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="static/style.css">
  </head>
  <body>
    <div class="card">
      <h1>Загрузка файлов</h1>
      <p>Шаблоны доступны в форматах <strong>.odp</strong></p>
      <p>Текст используется в формате <strong>.json</strong></p>
      <form action="/render_files" method="post" enctype="multipart/form-data">
        <div class="form-group">
          <label class="select-label">Выберите шаблон:</label>
          <select name="template" id="templateSelect" required>
            <option value="">--Выберите шаблон--</option>
            <option value="ETI">ЕТИ</option>
            <option value="IGSN">ИГСН</option>
            <option value="IISCT">ИИСЦТ</option>
            <option value="IKIP">ИКИП</option>
            <option value="IPAT">ИПАТ</option>
            <option value="MA">МА</option>
            <option value="YUF">ЮФ</option>
          </select>
        </div>
        <div id="templateInfo"></div>
        <button type="submit">Отправить</button>
      </form>
      <div class="note">Файл будет сконвертирован в PDF</div>
    </div>
    <script>
      const templateFiles = {
        "ETI": "static/templates/Shablon_ETI.odp",
        "IGSN": "static/templates/Shablon_IGSN.odp",
        "IISCT": "static/templates/Shablon_IISCT.odp",
        "IKIP": "static/templates/Shablon_IKIP.odp",
        "IPAT": "static/templates/Shablon_IPAT.odp",
        "MA": "static/templates/Shablon_MA.odp",
        "YUF": "static/templates/Shablon_YUF.odp"
      };
      const templatePreviews = {
        "ETI": "static/previews/ETI_preview.png",
        "IGSN": "static/previews/IGSN_preview.png",
        "IISCT": "static/previews/IISCT_preview.png",
        "IKIP": "static/previews/IKIP_preview.png",
        "IPAT": "static/previews/IPAT_preview.png",
        "MA": "static/previews/MA_preview.png",
        "YUF": "static/previews/YUF_preview.png"
      };
      
      // Мета-информация о шаблонах
      const templatesMeta = {
        "ETI": {
          fullName: "Естественно-технологический институт",
          color: "#006d5b"
        },
        "IGSN": {
          fullName: "Институт гуманитарных и социальных наук",
          color: "#d76e00"
        },
        "IISCT": {
          fullName: "Институт интеллектуальных систем и цифровых технологий",
          color: "#00008b"
        },
        "IKIP": {
          fullName: "Институт креативных индустрий и предпринимательства",
          color: "#a000fa"
        },
        "IPAT": {
          fullName: "Институт прикладных арктических технологий",
          color: "#5f09c6"
        },
        "MA": {
          fullName: "Морская академия",
          color: "#0095b6"
        },
        "YUF": {
          fullName: "Юридический факультет",
          color: "#9c1a15"
        }
      };
      
      const selectElement = document.getElementById("templateSelect");
      const infoContainer = document.getElementById("templateInfo");
      
      function updateTemplateInfo() {
        const selectedValue = selectElement.value;
        
        if (!selectedValue) {
          infoContainer.innerHTML = `
            <div class="template-card">
              <div style="text-align: center; color: #8b6c64; padding: 20px;">
                Тут будет превью шаблона
              </div>
            </div>
          `;
          return;
        }
        
        const meta = templatesMeta[selectedValue];
        const fileName = templateFiles[selectedValue];
        const shortName = selectElement.options[selectElement.selectedIndex].text;
        const previewUrl = templatePreviews[selectedValue];
        
        if (meta) {
          infoContainer.innerHTML = `
            <div class="template-card selected">
              <div class="template-header">
                <div class="template-icon" style="background: ${meta.color};"></div>
                <div>
                  <div class="template-title">${shortName}</div>
                  <div class="template-desc">${meta.fullName}</div>
                </div>
              </div>
              
              <!-- КАРТИНКА-ПРЕВЬЮ между названием института и именем файла -->
              <div style="margin: 15px 0; text-align: center;">
                <img src="${previewUrl}" 
                     alt="Превью шаблона ${shortName}"
                     style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #e1d1cb;"
                     onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML += '<div style=\'color:#8b6c64; font-size:13px; padding:10px;\'>⚠️ Превью недоступно<br><small>Положите PNG по пути: ${previewUrl}</small></div>';" />
              </div>
              
              <div class="template-meta">
                <div class="meta-item">
                  <strong>Файл:</strong> ${fileName.split('/').pop()}
                </div>
              </div>
            </div>
          `;
        } else {
          infoContainer.innerHTML = `
            <div class="template-card selected">
              <div class="template-header">
                <div>
                  <div class="template-title">${shortName}</div>
                  <div class="template-desc">Файл: ${fileName}</div>
                </div>
              </div>
              <div class="template-meta">
                <span class="badge">ODP шаблон</span>
                <span class="badge">Готов к конвертации</span>
              </div>
            </div>
          `;
        }
      }
      
      selectElement.addEventListener("change", updateTemplateInfo);
      updateTemplateInfo();
      
      const form = document.querySelector("form");
      form.addEventListener("submit", function(e) {
        if (!selectElement.value) {
          e.preventDefault();
          alert("Пожалуйста, выберите шаблон из списка!");
        }
      });
    </script>
  </body>
</html>
