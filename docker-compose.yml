version: '3.8'

services:
  fastapi-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-container
    ports: []
    volumes:
      - ./:/app
      - ./temp:/app/temp
      - ./rendered_files:/app/rendered_files
      - ./faculties:/app/faculties
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - UNOSERVER_HOST=unoserver-container
      - UNOSERVER_PORT=2003
    depends_on:
      - unoserver-docker
    networks:
      - internal
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  unoserver-docker:
    image: ghcr.io/unoconv/unoserver-docker
    container_name: unoserver-container
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: fastapi-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    networks:
      - internal
    depends_on:
      - fastapi-server

networks:
  internal:
    driver: bridge