<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор PDF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Генератор PDF</h2>

        <div class="controls">
            <div class="form-group">
                <label class="select-label">Выберите факультет:</label>
                <select id="facultiesSelect">
                    <option value="">Загрузка факультетов...</option>
                </select>
            </div>
            <button id="createButton">Создать и скачать PDF</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div id="loaderOverlay" class="loader-overlay">
            <div class="loader-content">
                <div class="spinner"></div>
                <div class="loader-text">Генерация PDF, пожалуйста, подождите...</div>
                <div class="loader-text" style="font-size: 12px; color: #666; margin-top: 5px;">Конвертация может занять до 2 минут</div>
            </div>
        </div>
    </div>

    <script src="/static/scripts/utils.js"></script>
    <script src="/static/scripts/app.js"></script>
</body>
</html>
